<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy Anniversary, Honeypie</title>
    <link rel="icon" href="data:," />
    <link rel="preload" as="image" href="zegypt.png" />
    <style>
      :root {
        --paper-a: #1e9d4f;
        --paper-b: #f04f8b;
        --paper-c: #2d7ef7;
        --paper-d: #ffd84d;
        --ink: #231f20;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
        margin: 0;
      }

      body {
        min-height: 100vh;
        overflow: hidden;
        background: white;
        color: var(--ink);
        font-family:
          Impact, Haettenschweiler, "Arial Black", "Franklin Gothic Heavy",
          sans-serif;
      }

      body.is-started {
        background: var(--paper-a);
      }

      .start-screen {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: block;
        width: 100%;
        height: 100%;
        padding: 0;
        cursor: pointer;
        background: white;
        border: 0;
      }

      body.is-started .start-screen {
        display: none;
      }

      .card {
        position: relative;
        display: none;
        min-height: 100vh;
        place-items: center;
        isolation: isolate;
        animation: paper-flash 4.8s steps(1, end) infinite;
      }

      body.is-started .card {
        display: grid;
      }

      .card::before {
        position: absolute;
        inset: 0;
        z-index: -3;
        content: "";
        background:
          radial-gradient(circle at 24% 16%, rgb(255 255 255 / 0.16), transparent 18%),
          radial-gradient(circle at 78% 34%, rgb(0 0 0 / 0.08), transparent 14%),
          linear-gradient(132deg, rgb(255 255 255 / 0.1), transparent 34%),
          repeating-linear-gradient(
            7deg,
            rgb(255 255 255 / 0.035) 0 2px,
            transparent 2px 8px
          );
        mix-blend-mode: soft-light;
        pointer-events: none;
      }

      .card::after {
        position: absolute;
        inset: -20vmax;
        z-index: -2;
        content: "";
        background:
          conic-gradient(
            from 0deg,
            transparent,
            rgb(255 255 255 / 0.3),
            transparent 18%,
            transparent 31%,
            rgb(255 245 118 / 0.28),
            transparent 48%,
            transparent 65%,
            rgb(255 255 255 / 0.22),
            transparent
          );
        animation: disco-spin 5.5s linear infinite;
        opacity: 0.72;
        pointer-events: none;
      }

      .stage {
        position: relative;
        width: 100vw;
        height: 100vh;
        min-height: 620px;
      }

      .spotlight {
        position: absolute;
        inset: auto 7% 1% 7%;
        height: 22%;
        border-radius: 50%;
        background: radial-gradient(ellipse, rgb(0 0 0 / 0.24), transparent 64%);
        filter: blur(10px);
        transform: rotate(-3deg);
        animation: shadow-pop 1.4s cubic-bezier(0.2, 0.9, 0.2, 1) both;
      }

      .dog-wrap {
        position: absolute;
        right: 8%;
        bottom: -25%;
        width: min(54vw, 520px);
        animation:
          dog-enter 1.35s cubic-bezier(0.18, 0.92, 0.24, 1.08) both,
          dog-bounce 1.65s ease-in-out 1.35s infinite;
        transform-origin: 55% 85%;
      }

      .dog-cutout {
        display: block;
        width: 100%;
        height: auto;
      }

      .shades {
        position: absolute;
        top: 21.7%;
        left: 38.8%;
        z-index: 1;
        width: 25.5%;
        aspect-ratio: 3.7;
        opacity: 0;
        pointer-events: none;
        transform: translate(-150%, -260%) rotate(-24deg) scale(0.58);
        transform-origin: 52% 48%;
      }

      .dog-wrap.shades-on .shades {
        animation: shades-tween 2.45s cubic-bezier(0.18, 0.9, 0.24, 1) both;
        will-change: transform, opacity;
      }

      .masquerade-mask {
        position: absolute;
        top: 21.2%;
        left: 35.2%;
        z-index: 2;
        width: 32%;
        aspect-ratio: 2.35;
        opacity: 0;
        pointer-events: none;
        transform: translate(-130%, -220%) rotate(-28deg) scale(0.54);
        transform-origin: 54% 56%;
      }

      .dog-wrap.mask-on .masquerade-mask {
        animation: mask-tween 3s cubic-bezier(0.18, 0.9, 0.24, 1) both;
        will-change: transform, opacity;
      }

      .masquerade-mask::before {
        position: absolute;
        inset: 0;
        content: "";
        background:
          radial-gradient(ellipse at 30% 56%, #111 0 12%, transparent 13%),
          radial-gradient(ellipse at 69% 54%, #111 0 12%, transparent 13%),
          linear-gradient(90deg, transparent 0 8%, #f3c64e 8% 12%, transparent 12% 88%, #f3c64e 88% 92%, transparent 92%),
          radial-gradient(ellipse at 50% 15%, rgb(255 255 255 / 0.82), transparent 34%),
          #f8f1df;
        border: 0.09em solid #111;
        border-radius: 49% 51% 46% 45% / 68% 68% 35% 35%;
        box-shadow:
          inset 0 -0.2em 0 rgb(243 198 78 / 0.42),
          0 0.12em 0 rgb(0 0 0 / 0.22);
        clip-path: polygon(
          1% 41%,
          14% 12%,
          34% 3%,
          50% 20%,
          66% 3%,
          86% 12%,
          99% 41%,
          82% 82%,
          61% 68%,
          50% 92%,
          39% 68%,
          18% 82%
        );
      }

      .masquerade-mask::after {
        position: absolute;
        top: -18%;
        left: 50%;
        width: 18%;
        aspect-ratio: 1;
        content: "";
        background: #f3c64e;
        border: 0.06em solid #111;
        border-radius: 50% 50% 45% 45%;
        box-shadow:
          -1.05em 0.12em 0 -0.18em #f3c64e,
          1.05em 0.12em 0 -0.18em #f3c64e,
          -1.05em 0.12em 0 -0.12em #111,
          1.05em 0.12em 0 -0.12em #111;
        transform: translateX(-50%);
      }

      .heart-thought {
        position: absolute;
        top: -4%;
        left: 8%;
        z-index: 2;
        display: grid;
        width: 29%;
        min-width: 7.4rem;
        aspect-ratio: 1.35;
        place-items: center;
        color: #ff337c;
        font-family: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif;
        font-size: clamp(2.3rem, 5.5vw, 4.7rem);
        line-height: 1;
        opacity: 0;
        pointer-events: none;
        text-shadow:
          0.045em 0.045em 0 #111,
          0 0 0.08em rgb(255 255 255 / 0.75);
        transform: translate(-18%, 18%) rotate(-9deg) scale(0.42);
        transform-origin: 60% 100%;
        animation: thought-bubble 28s cubic-bezier(0.18, 0.9, 0.22, 1) 8s infinite;
      }

      .heart-thought::before {
        position: absolute;
        inset: 0;
        z-index: -1;
        content: "";
        background: white;
        border: 0.08em solid #111;
        border-radius: 54% 46% 50% 48% / 48% 56% 44% 52%;
        box-shadow:
          0.13em 0.13em 0 rgb(0 0 0 / 0.2),
          inset 0 -0.08em 0 rgb(255 121 177 / 0.24);
      }

      .heart-thought::after {
        position: absolute;
        right: 16%;
        bottom: -24%;
        width: 20%;
        aspect-ratio: 1;
        content: "";
        background:
          radial-gradient(circle at 88% 122%, white 0 22%, transparent 23%),
          radial-gradient(circle, white 0 48%, transparent 49%);
        filter: drop-shadow(0.08em 0.08em 0 #111)
          drop-shadow(0.08em 0.08em 0 rgb(0 0 0 / 0.16));
      }

      .shades::before,
      .shades::after {
        position: absolute;
        top: 8%;
        width: 43%;
        height: 78%;
        content: "";
        background:
          linear-gradient(135deg, rgb(255 255 255 / 0.34), transparent 34%),
          #101012;
        border: 0.08em solid #000;
        border-radius: 48% 48% 54% 54%;
        box-shadow:
          inset 0 -0.16em 0 rgb(255 255 255 / 0.08),
          0 0.13em 0 rgb(0 0 0 / 0.24);
      }

      .shades::before {
        left: 0;
        transform: rotate(5deg);
      }

      .shades::after {
        right: 0;
        transform: rotate(-5deg);
      }

      .shades span {
        position: absolute;
        top: 38%;
        left: 40%;
        z-index: 1;
        width: 20%;
        height: 24%;
        border-top: 0.1em solid #000;
        border-radius: 50% 50% 0 0;
      }

      .egypt-wrap {
        position: absolute;
        bottom: -19%;
        left: -3%;
        width: min(39vw, 360px);
        opacity: 0;
        pointer-events: none;
        transform: translate(-74%, 48%) rotate(-12deg) scale(0.88);
        transform-origin: 48% 88%;
      }

      .egypt-wrap.is-dancing {
        animation: egyptian-cameo 4.2s cubic-bezier(0.18, 0.82, 0.25, 1) both;
        will-change: transform, opacity;
      }

      .egypt-flip {
        transform-origin: 50% 68%;
      }

      .egypt-wrap.is-dancing .egypt-flip {
        animation: egyptian-flip 0.6s steps(1, end) 5 0.58s;
        will-change: transform;
      }

      .egypt-dog {
        display: block;
        width: 100%;
        height: auto;
        transform-origin: 50% 54%;
      }

      .egypt-wrap.is-dancing .egypt-dog {
        animation: egyptian-arms 0.3s ease-in-out 10 0.58s;
        will-change: transform;
      }

      .letter {
        position: absolute;
        top: 4%;
        left: 4%;
        min-width: 0.85em;
        color: #ffd72e;
        font-size: clamp(8rem, 31vw, 18rem);
        line-height: 0.78;
        letter-spacing: 0;
        text-align: center;
        text-transform: uppercase;
        text-shadow:
          0.025em 0.035em 0 rgb(0 0 0 / 0.18),
          0 0 0.025em rgb(255 255 255 / 0.35);
        transform: rotate(-8deg);
        animation: letter-party 0.8s steps(1, end) infinite;
      }

      .baby-z-burst {
        position: absolute;
        top: 44%;
        left: 47%;
        z-index: 0;
        color: rgb(255 255 255 / 0.24);
        font-size: clamp(17rem, 47vw, 37rem);
        line-height: 0.7;
        opacity: 0;
        pointer-events: none;
        text-shadow:
          0.025em 0.025em 0 rgb(0 0 0 / 0.16),
          -0.018em 0.018em 0 rgb(255 51 124 / 0.34),
          0.018em -0.018em 0 rgb(49 231 255 / 0.32);
        transform: translate(-50%, -50%) rotate(-13deg) scale(0.48);
        transform-origin: 50% 52%;
      }

      .baby-z-burst.is-active {
        animation: baby-z-burst 1.35s cubic-bezier(0.18, 0.9, 0.22, 1) both;
      }

      .mommy-burst {
        position: absolute;
        top: 45%;
        left: 50%;
        z-index: 0;
        color: rgb(255 255 255 / 0.24);
        font-size: clamp(6.3rem, 18vw, 15rem);
        line-height: 0.78;
        opacity: 0;
        pointer-events: none;
        text-shadow:
          0.025em 0.025em 0 rgb(0 0 0 / 0.16),
          -0.018em 0.018em 0 rgb(255 51 124 / 0.38),
          0.018em -0.018em 0 rgb(49 231 255 / 0.32);
        transform: translate(-50%, -50%) rotate(8deg) scale(0.5);
        transform-origin: 50% 52%;
      }

      .mommy-burst.is-active {
        animation: mommy-burst 1.45s cubic-bezier(0.18, 0.9, 0.22, 1) both;
      }

      .letter::before {
        position: absolute;
        inset: -0.13em -0.07em -0.1em;
        z-index: -1;
        content: "";
        background: rgb(255 231 84 / 0.18);
        clip-path: polygon(5% 13%, 90% 2%, 100% 82%, 12% 100%);
      }

      .title {
        position: absolute;
        left: 5%;
        bottom: 4%;
        z-index: 2;
        max-width: 11ch;
        color: white;
        font-family: Arial, Helvetica, sans-serif;
        font-size: clamp(1.15rem, 3vw, 2.15rem);
        font-weight: 900;
        letter-spacing: 0;
        line-height: 0.9;
        text-align: left;
        text-shadow: 0 3px 0 rgb(0 0 0 / 0.26);
        text-transform: uppercase;
      }

      .lyrics {
        position: absolute;
        top: 46%;
        left: 50%;
        z-index: 1;
        display: grid;
        width: min(72vw, 780px);
        min-height: 13rem;
        place-items: center;
        pointer-events: none;
        text-align: center;
        transform: translate(-50%, -50%) rotate(-2deg);
      }

      .lyric-word {
        display: inline-block;
        max-width: 100%;
        color: #fff36f;
        font-size: clamp(2.5rem, 7.4vw, 5.9rem);
        line-height: 0.88;
        letter-spacing: 0;
        overflow-wrap: anywhere;
        text-transform: uppercase;
        text-shadow:
          0.055em 0.055em 0 #111,
          -0.03em 0.035em 0 #ff4fa3,
          0.03em -0.03em 0 #31e7ff,
          0 0.1em 0 rgb(0 0 0 / 0.2);
        transform-origin: 50% 72%;
      }

      .lyric-word.is-popping {
        animation: lyric-pop 0.34s cubic-bezier(0.18, 0.92, 0.22, 1.28) both;
      }

      .lyric-line {
        position: absolute;
        top: calc(50% + 5.2rem);
        left: 50%;
        width: 100%;
        color: white;
        font-family: Arial, Helvetica, sans-serif;
        font-size: clamp(0.9rem, 2.3vw, 1.45rem);
        font-weight: 900;
        line-height: 1;
        text-shadow: 0 2px 0 rgb(0 0 0 / 0.35);
        text-transform: uppercase;
        transform: translateX(-50%);
      }

      .lyric-line span {
        display: inline-block;
        margin: 0 0.12em;
        opacity: 0.46;
        transform: translateY(0.06em) scale(0.94);
        transition:
          color 0.16s ease,
          opacity 0.16s ease,
          transform 0.16s ease;
      }

      .lyric-line span.is-active {
        color: #fff36f;
        opacity: 1;
        transform: translateY(-0.05em) scale(1.08) rotate(-2deg);
      }

      .confetti {
        position: absolute;
        inset: 0;
        z-index: -1;
        overflow: hidden;
        pointer-events: none;
      }

      .confetti i {
        position: absolute;
        width: 0.72rem;
        height: 1.45rem;
        border-radius: 1px;
        background: var(--piece-color);
        transform: translateY(-120vh) rotate(0deg);
        animation: fall var(--fall-time) linear infinite;
        animation-delay: var(--fall-delay);
        left: var(--left);
        opacity: 0.85;
      }

      .timing-helper {
        position: fixed;
        right: 1rem;
        bottom: 1rem;
        z-index: 20;
        display: none;
        width: min(24rem, calc(100vw - 2rem));
        padding: 0.9rem;
        color: #111;
        font-family: Arial, Helvetica, sans-serif;
        background: rgb(255 255 255 / 0.92);
        border: 3px solid #111;
        box-shadow: 0.35rem 0.35rem 0 rgb(0 0 0 / 0.24);
      }

      body.is-timing .timing-helper {
        display: block;
      }

      .timing-helper strong,
      .timing-helper span,
      .timing-helper button {
        font: inherit;
      }

      .timing-helper strong {
        display: block;
        margin-bottom: 0.45rem;
        font-weight: 900;
      }

      .timing-helper p {
        margin: 0.35rem 0;
        font-size: 0.9rem;
        line-height: 1.25;
      }

      .timing-helper button {
        margin-top: 0.55rem;
        padding: 0.45rem 0.65rem;
        color: white;
        font-weight: 900;
        cursor: pointer;
        background: #111;
        border: 0;
      }

      @keyframes paper-flash {
        0%,
        100% {
          background-color: var(--paper-a);
        }
        14.28% {
          background-color: #e83f68;
        }
        28.56% {
          background-color: var(--paper-c);
        }
        42.84% {
          background-color: #f49b22;
        }
        57.12% {
          background-color: #8f43d9;
        }
        71.4% {
          background-color: #14b8a6;
        }
        85.68% {
          background-color: #f6cf3f;
        }
      }

      @keyframes disco-spin {
        to {
          transform: rotate(1turn);
        }
      }

      @keyframes dog-enter {
        0% {
          opacity: 0;
          transform: translateX(95vw) rotate(10deg) scale(0.94);
        }
        74% {
          opacity: 1;
          transform: translateX(-2%) rotate(-2deg) scale(1.02);
        }
        100% {
          opacity: 1;
          transform: translateX(0) rotate(0deg) scale(1);
        }
      }

      @keyframes dog-bounce {
        0%,
        100% {
          transform: translateY(0) rotate(0deg);
        }
        50% {
          transform: translateY(-1.1%) rotate(0.7deg);
        }
      }

      @keyframes shades-tween {
        0% {
          opacity: 0;
          transform: translate(-150%, -260%) rotate(-24deg) scale(0.58);
        }
        22% {
          opacity: 1;
          transform: translate(5%, -8%) rotate(7deg) scale(1.08);
        }
        32%,
        74% {
          opacity: 1;
          transform: translate(0, 0) rotate(-4deg) scale(1);
        }
        100% {
          opacity: 0;
          transform: translate(116%, 84%) rotate(18deg) scale(0.82);
        }
      }

      @keyframes mask-tween {
        0% {
          opacity: 0;
          transform: translate(-130%, -220%) rotate(-28deg) scale(0.54);
        }
        20% {
          opacity: 1;
          transform: translate(4%, -8%) rotate(8deg) scale(1.12);
        }
        30%,
        68% {
          opacity: 1;
          transform: translate(0, 0) rotate(-3deg) scale(1);
        }
        82% {
          opacity: 1;
          transform: translate(8%, -3%) rotate(5deg) scale(1.03);
        }
        100% {
          opacity: 0;
          transform: translate(112%, 72%) rotate(20deg) scale(0.76);
        }
      }

      @keyframes thought-bubble {
        0%,
        69% {
          opacity: 0;
          transform: translate(-18%, 18%) rotate(-9deg) scale(0.42);
        }
        74% {
          opacity: 1;
          transform: translate(-6%, -4%) rotate(5deg) scale(1.08);
        }
        78%,
        88% {
          opacity: 1;
          transform: translate(0, 0) rotate(-4deg) scale(1);
        }
        91% {
          opacity: 1;
          transform: translate(3%, -9%) rotate(4deg) scale(1.03);
        }
        100% {
          opacity: 0;
          transform: translate(14%, -28%) rotate(10deg) scale(0.72);
        }
      }

      @keyframes egyptian-flip {
        0%,
        49.9% {
          transform: translateX(-2%) rotate(-1deg) scaleX(1);
        }
        50%,
        100% {
          transform: translateX(2%) rotate(1deg) scaleX(-1);
        }
      }

      @keyframes egyptian-cameo {
        0% {
          opacity: 0;
          transform: translate(-74%, 48%) rotate(-12deg) scale(0.88);
        }
        14%,
        84% {
          opacity: 1;
          transform: translate(0, 0) rotate(0deg) scale(1);
        }
        100% {
          opacity: 0;
          transform: translate(-74%, 48%) rotate(-12deg) scale(0.88);
        }
      }

      @keyframes egyptian-arms {
        0%,
        100% {
          transform: scaleX(0.96) skewY(-1.5deg);
        }
        50% {
          transform: scaleX(1.05) skewY(1.5deg) translateY(-1.4%);
        }
      }

      @keyframes shadow-pop {
        from {
          opacity: 0;
          transform: scaleX(0.4) rotate(-3deg);
        }
        to {
          opacity: 1;
          transform: scaleX(1) rotate(-3deg);
        }
      }

      @keyframes letter-party {
        0%,
        100% {
          color: #ffd72e;
          transform: rotate(-8deg) scale(1);
        }
        25% {
          color: #ffffff;
          transform: rotate(7deg) scale(1.08);
        }
        50% {
          color: #2ef2ff;
          transform: rotate(-4deg) scale(0.96);
        }
        75% {
          color: #ff7ad9;
          transform: rotate(9deg) scale(1.04);
        }
      }

      @keyframes baby-z-burst {
        0% {
          opacity: 0;
          transform: translate(-59%, -43%) rotate(-22deg) scale(0.44);
        }
        18% {
          opacity: 1;
          transform: translate(-51%, -50%) rotate(7deg) scale(1.08);
        }
        38% {
          opacity: 0.9;
          transform: translate(-47%, -47%) rotate(-8deg) scale(0.96);
        }
        64% {
          opacity: 0.82;
          transform: translate(-53%, -52%) rotate(5deg) scale(1.04);
        }
        100% {
          opacity: 0;
          transform: translate(-42%, -57%) rotate(18deg) scale(1.2);
        }
      }

      @keyframes mommy-burst {
        0% {
          opacity: 0;
          transform: translate(-42%, -39%) rotate(15deg) scale(0.44);
        }
        18% {
          opacity: 1;
          transform: translate(-51%, -50%) rotate(-6deg) scale(1.05);
        }
        40% {
          opacity: 0.9;
          transform: translate(-49%, -47%) rotate(5deg) scale(0.98);
        }
        68% {
          opacity: 0.82;
          transform: translate(-53%, -52%) rotate(-4deg) scale(1.04);
        }
        100% {
          opacity: 0;
          transform: translate(-58%, -58%) rotate(-16deg) scale(1.14);
        }
      }

      @keyframes lyric-pop {
        0% {
          opacity: 0;
          transform: translateY(0.24em) rotate(-8deg) scale(0.42);
        }
        64% {
          opacity: 1;
          transform: translateY(-0.06em) rotate(4deg) scale(1.16);
        }
        100% {
          opacity: 1;
          transform: translateY(0) rotate(0deg) scale(1);
        }
      }

      @keyframes fall {
        to {
          transform: translateY(120vh) rotate(540deg);
        }
      }

      @media (max-width: 640px) {
        .stage {
          width: 100vw;
          min-height: 100vh;
        }

        .dog-wrap {
          right: -8%;
          bottom: -25%;
          width: 98%;
        }

        .heart-thought {
          top: 2%;
          left: 5%;
          min-width: 5.8rem;
          font-size: clamp(2rem, 12vw, 3.8rem);
        }

        .masquerade-mask {
          top: 22%;
          left: 34%;
          width: 34%;
        }

        .egypt-wrap {
          bottom: -11%;
          left: -9%;
          width: 55%;
        }

        .letter {
          top: 7%;
          left: 5%;
          font-size: clamp(7rem, 38vw, 11rem);
        }

        .baby-z-burst {
          top: 45%;
          left: 50%;
          font-size: clamp(13rem, 76vw, 20rem);
        }

        .mommy-burst {
          top: 45%;
          left: 50%;
          font-size: clamp(4.4rem, 24vw, 7.2rem);
        }

        .lyrics {
          top: 43%;
          width: 92vw;
          min-height: 10rem;
        }

        .lyric-word {
          font-size: clamp(2rem, 10.5vw, 4rem);
        }

        .lyric-line {
          top: calc(50% + 3.7rem);
          font-size: 0.78rem;
        }

        .title {
          top: 4%;
          right: 1rem;
          bottom: auto;
          left: auto;
          width: 8.75rem;
          max-width: none;
          font-size: 0.95rem;
          text-align: right;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <button class="start-screen" type="button" aria-label="Start Zuchou card"></button>
    <main class="card" aria-label="Animated anniversary disco card for Honeypie">
      <div class="confetti" aria-hidden="true"></div>
      <audio class="party-track" src="zuchou-shu.mp3" loop preload="auto"></audio>
      <section class="stage">
        <div class="spotlight" aria-hidden="true"></div>
        <div class="baby-z-burst" aria-hidden="true">Z</div>
        <div class="mommy-burst" aria-hidden="true">MOMMY</div>
        <div class="letter" aria-label="Zuchou letter animation">Z</div>
        <div class="lyrics" aria-live="polite">
          <div class="lyric-word"></div>
          <div class="lyric-line" aria-hidden="true"></div>
        </div>
        <div class="dog-wrap">
          <img
            class="dog-cutout"
            src="zuchououtlined.png"
            alt="Zuchou ready for an anniversary disco party"
          />
          <div class="heart-thought" aria-hidden="true">❤️</div>
          <div class="masquerade-mask" aria-hidden="true"></div>
          <div class="shades" aria-hidden="true"><span></span></div>
        </div>
        <div class="egypt-wrap" aria-hidden="true">
          <div class="egypt-flip">
            <img class="egypt-dog" src="zegypt.png" alt="" />
          </div>
        </div>
        <div class="title">Happy Anniversary Honeypie</div>
      </section>
    </main>
    <aside class="timing-helper" aria-live="polite">
      <strong>Timing helper</strong>
      <p>Press Space when each word starts. Press Backspace to undo.</p>
      <p>Next: <span class="timing-next">Z</span></p>
      <p>Captured: <span class="timing-count">0</span>/<span class="timing-total">0</span></p>
      <button class="timing-copy" type="button">Copy timings</button>
    </aside>

    <script>
      const letters = ["Z", "U", "C", "H", "O", "U"];
      const timingMode = new URLSearchParams(window.location.search).has("timing");
      const startScreenEl = document.querySelector(".start-screen");
      const letterEl = document.querySelector(".letter");
      const babyZBurstEl = document.querySelector(".baby-z-burst");
      const mommyBurstEl = document.querySelector(".mommy-burst");
      const lyricWordEl = document.querySelector(".lyric-word");
      const lyricLineEl = document.querySelector(".lyric-line");
      const timingNextEl = document.querySelector(".timing-next");
      const timingCountEl = document.querySelector(".timing-count");
      const timingTotalEl = document.querySelector(".timing-total");
      const timingCopyEl = document.querySelector(".timing-copy");
      const confettiEl = document.querySelector(".confetti");
      const dogWrapEl = document.querySelector(".dog-wrap");
      const egyptWrapEl = document.querySelector(".egypt-wrap");
      const partyTrackEl = document.querySelector(".party-track");
      const confettiColors = ["#ffd72e", "#ff5b93", "#22d3ee", "#ffffff", "#7cfc64"];
      const letterDelay = 650;
      const firstLetterLoopDuration = letters.length * letterDelay;
      const shadesTweenDuration = 2450;
      const maskTweenDuration = 3000;
      let letterIndex = 0;
      let hasStarted = false;
      let activeLyricCueKey = "";
      let lyricFrameId = 0;
      const capturedTimings = [];

      const lyricTimings = [
        { word: "z", line: "z u c h o u", time: 9.697 },
        { word: "u", line: "z u c h o u", time: 10.271 },
        { word: "c", line: "z u c h o u", time: 10.301 },
        { word: "h", line: "z u c h o u", time: 10.655 },
        { word: "o", line: "z u c h o u", time: 11.847 },
        { word: "u", line: "z u c h o u", time: 12.168 },
        { word: "zoo-shoe", line: "zoo-shoe", time: 12.603 },
        { word: "z", line: "z u c h o u", time: 12.911 },
        { word: "u", line: "z u c h o u", time: 14.386 },
        { word: "c", line: "z u c h o u", time: 14.893 },
        { word: "h", line: "z u c h o u", time: 15.22 },
        { word: "o", line: "z u c h o u", time: 16.444 },
        { word: "u", line: "z u c h o u", time: 16.835 },
        { word: "zoo-shoe", line: "zoo-shoe", time: 17.157 },
        { word: "mommy", line: "mommy love me", time: 18.954 },
        { word: "love", line: "mommy love me", time: 19.406 },
        { word: "me", line: "mommy love me", time: 19.851 },
        { word: "and", line: "and baby love you", time: 21.075 },
        { word: "baby", line: "and baby love you", time: 21.756 },
        { word: "love", line: "and baby love you", time: 22.365 },
        { word: "you", line: "and baby love you", time: 23.534 },
        { word: "z", line: "z u c h o and u", time: 24.054 },
        { word: "u", line: "z u c h o and u", time: 24.369 },
        { word: "c", line: "z u c h o and u", time: 25.141 },
        { word: "h", line: "z u c h o and u", time: 25.733 },
        { word: "o", line: "z u c h o and u", time: 26.372 },
        { word: "and", line: "z u c h o and u", time: 26.636 },
        { word: "u", line: "z u c h o and u", time: 28.114 },
        { word: "happy", line: "happy -- anniversary", time: 28.636 },
        { word: "--", line: "happy -- anniversary", time: 28.825 },
        { word: "anniversary", line: "happy -- anniversary", time: 29.015 },
        { word: "HONEY", line: "HONEY", time: 32.0 },
        { word: "happy", line: "happy anniversary", time: 32.64 },
        { word: "anniversary", line: "happy anniversary", time: 34.876 },
        { word: "HONEY", line: "HONEY", time: 35.382 },
        { word: "baby", line: "baby z", time: 37.315 },
        { word: "z", line: "baby z", time: 39.473 },
        { word: "he", line: "he love mommy", time: 40.016 },
        { word: "love", line: "he love mommy", time: 40.63 },
        { word: "mommy", line: "he love mommy", time: 41.794 },
        { word: "mommy", line: "mommy love him", time: 42.671 },
        { word: "love", line: "mommy love him", time: 43.668 },
        { word: "him", line: "mommy love him", time: 44.586 },
        { word: "mommy", line: "mommy love me", time: 45.119 },
        { word: "love", line: "mommy love me", time: 45.588 },
        { word: "me", line: "mommy love me", time: 46.398 },
        { word: "Z", line: "Z U C H O and the U", time: 46.84 },
        { word: "U", line: "Z U C H O and the U", time: 47.192 },
        { word: "C", line: "Z U C H O and the U", time: 48.099 },
        { word: "H", line: "Z U C H O and the U", time: 48.729 },
        { word: "O", line: "Z U C H O and the U", time: 49.337 },
        { word: "and", line: "Z U C H O and the U", time: 50.015 },
        { word: "the", line: "Z U C H O and the U", time: 50.194 },
        { word: "U", line: "Z U C H O and the U", time: 50.917 },
        { word: "didnt", line: "didnt pick my parents", time: 51.66 },
        { word: "pick", line: "didnt pick my parents", time: 52.254 },
        { word: "my", line: "didnt pick my parents", time: 52.501 },
        { word: "parents", line: "didnt pick my parents", time: 53.201 },
        { word: "my", line: "my parents pick me", time: 53.714 },
        { word: "parents", line: "my parents pick me", time: 54.13 },
        { word: "pick", line: "my parents pick me", time: 55.431 },
        { word: "me", line: "my parents pick me", time: 56.039 },
        { word: "holy", line: "holy shnikes", time: 56.336 },
        { word: "shnikes", line: "holy shnikes", time: 56.959 },
        { word: "best", line: "best place i could be", time: 57.738 },
        { word: "place", line: "best place i could be", time: 58.119 },
        { word: "i", line: "best place i could be", time: 58.419 },
        { word: "could", line: "best place i could be", time: 58.659 },
        { word: "be", line: "best place i could be", time: 59.91 },
        { word: "mommy", line: "mommy i love you", time: 60.357 },
        { word: "i", line: "mommy i love you", time: 60.682 },
        { word: "love", line: "mommy i love you", time: 61.386 },
        { word: "you", line: "mommy i love you", time: 62.261 },
        { word: "you're", line: "you're so good to daddy", time: 62.575 },
        { word: "so", line: "you're so good to daddy", time: 62.988 },
        { word: "good", line: "you're so good to daddy", time: 63.286 },
        { word: "to", line: "you're so good to daddy", time: 63.788 },
        { word: "daddy", line: "you're so good to daddy", time: 64.552 },
        { word: "lets", line: "lets snuggle all morning", time: 64.853 },
        { word: "snuggle", line: "lets snuggle all morning", time: 65.152 },
        { word: "all", line: "lets snuggle all morning", time: 65.43 },
        { word: "morning", line: "lets snuggle all morning", time: 66.038 },
        { word: "i'll", line: "i'll hold my pee.", time: 66.91 },
        { word: "hold", line: "i'll hold my pee.", time: 67.192 },
        { word: "my", line: "i'll hold my pee.", time: 67.505 },
        { word: "pee.", line: "i'll hold my pee.", time: 67.794 },
      ];

      const lyricCues = lyricTimings.reduce((cues, timing) => {
        const previousCue = cues.at(-1);

        if (previousCue?.line === timing.line) {
          return cues;
        }

        cues.push({
          start: timing.time,
          end: 69.6,
          line: timing.line,
          lineWords: timing.line.split(" "),
          word: timing.line,
        });
        return cues;
      }, []);

      lyricCues.forEach((cue, index) => {
        const nextCue = lyricCues[index + 1];
        cue.end = nextCue ? Math.max(cue.start + 1.4, nextCue.start - 0.18) : 69.6;
      });

      if (timingMode) {
        document.body.classList.add("is-timing");
        timingTotalEl.textContent = lyricCues.length;
      }

      function updateTimingHelper() {
        if (!timingMode) {
          return;
        }

        timingCountEl.textContent = capturedTimings.length;
        timingNextEl.textContent =
          lyricCues[capturedTimings.length]?.word ?? "done - copy timings";
      }

      function startLetters() {
        letters.forEach((letter, index) => {
          setTimeout(() => {
            letterEl.textContent = letter;
            letterIndex = index;
          }, index * letterDelay);
        });

        setInterval(() => {
          letterIndex = (letterIndex + 1) % letters.length;
          letterEl.textContent = letters[letterIndex];
        }, letterDelay);
      }

      function setLyricCue(cueIndex, wordIndex) {
        const cueKey = `${cueIndex}:${wordIndex}`;
        const previousCueKey = activeLyricCueKey;

        if (activeLyricCueKey === cueKey) {
          return;
        }

        activeLyricCueKey = cueKey;

        if (cueIndex < 0) {
          lyricWordEl.textContent = "";
          lyricLineEl.replaceChildren();
          return;
        }

        const cue = lyricCues[cueIndex];

        if (!previousCueKey.startsWith(`${cueIndex}:`)) {
          lyricWordEl.textContent = cue.line;
          lyricWordEl.classList.remove("is-popping");
          void lyricWordEl.offsetWidth;
          lyricWordEl.classList.add("is-popping");
        }

        lyricLineEl.replaceChildren(
          ...cue.lineWords.map((word, index) => {
            const wordEl = document.createElement("span");
            wordEl.textContent = word;
            wordEl.classList.toggle("is-active", index <= wordIndex);
            return wordEl;
          }),
        );
      }

      function syncLyrics() {
        const currentTime = partyTrackEl.currentTime % 69.6;
        const cueIndex = lyricCues.findIndex(
          (cue) => currentTime >= cue.start && currentTime < cue.end,
        );
        const shouldShowBabyZ = currentTime >= 37 && currentTime < 38.14;
        const shouldShowMommy = currentTime >= 40 && currentTime < 41.28;

        if (shouldShowBabyZ && !babyZBurstEl.classList.contains("is-active")) {
          babyZBurstEl.classList.add("is-active");
        } else if (!shouldShowBabyZ && babyZBurstEl.classList.contains("is-active")) {
          babyZBurstEl.classList.remove("is-active");
        }

        if (shouldShowMommy && !mommyBurstEl.classList.contains("is-active")) {
          mommyBurstEl.classList.add("is-active");
        } else if (!shouldShowMommy && mommyBurstEl.classList.contains("is-active")) {
          mommyBurstEl.classList.remove("is-active");
        }

        if (cueIndex < 0) {
          setLyricCue(cueIndex, -1);
        } else {
          const cue = lyricCues[cueIndex];
          const progress = (currentTime - cue.start) / (cue.end - cue.start);
          const wordIndex = Math.min(
            cue.lineWords.length - 1,
            Math.floor(progress * cue.lineWords.length),
          );

          setLyricCue(cueIndex, wordIndex);
        }

        lyricFrameId = requestAnimationFrame(syncLyrics);
      }

      function recordTimingTap() {
        if (!timingMode || !hasStarted || capturedTimings.length >= lyricCues.length) {
          return;
        }

        const cue = lyricCues[capturedTimings.length];
        capturedTimings.push({
          word: cue.word,
          line: cue.line,
          time: Number(partyTrackEl.currentTime.toFixed(3)),
        });
        updateTimingHelper();
      }

      function undoTimingTap() {
        if (!timingMode || capturedTimings.length === 0) {
          return;
        }

        capturedTimings.pop();
        updateTimingHelper();
      }

      function copyTimingData() {
        const text = JSON.stringify(capturedTimings, null, 2);
        navigator.clipboard?.writeText(text).catch(() => {});
      }

      function startEgyptianCameo() {
        setTimeout(() => {
          egyptWrapEl.classList.add("is-dancing");
        }, firstLetterLoopDuration);
      }

      function startPartyTrack() {
        partyTrackEl.currentTime = 0;
        partyTrackEl.play().catch(() => {});
      }

      function scheduleShades() {
        const nextDelay = 18000 + Math.random() * 26000;

        setTimeout(() => {
          dogWrapEl.classList.remove("shades-on");
          void dogWrapEl.offsetWidth;
          dogWrapEl.classList.add("shades-on");

          setTimeout(() => {
            dogWrapEl.classList.remove("shades-on");
            scheduleShades();
          }, shadesTweenDuration);
        }, nextDelay);
      }

      function scheduleMask() {
        const nextDelay = 24000 + Math.random() * 36000;

        setTimeout(() => {
          dogWrapEl.classList.remove("mask-on");
          void dogWrapEl.offsetWidth;
          dogWrapEl.classList.add("mask-on");

          setTimeout(() => {
            dogWrapEl.classList.remove("mask-on");
            scheduleMask();
          }, maskTweenDuration);
        }, nextDelay);
      }

      function startConfetti() {
        for (let index = 0; index < 54; index += 1) {
          const piece = document.createElement("i");
          piece.style.setProperty("--left", `${Math.random() * 100}%`);
          piece.style.setProperty(
            "--piece-color",
            confettiColors[index % confettiColors.length],
          );
          piece.style.setProperty("--fall-time", `${3 + Math.random() * 3.4}s`);
          piece.style.setProperty("--fall-delay", `${Math.random() * -6}s`);
          confettiEl.append(piece);
        }
      }

      function startCard() {
        if (hasStarted) {
          return;
        }

        hasStarted = true;
        document.body.classList.add("is-started");
        startPartyTrack();
        startLetters();
        cancelAnimationFrame(lyricFrameId);
        syncLyrics();
        startEgyptianCameo();
        scheduleShades();
        scheduleMask();
        startConfetti();
        window.removeEventListener("keydown", startCard);
      }

      startScreenEl.addEventListener("click", startCard, { once: true });
      timingCopyEl.addEventListener("click", copyTimingData);
      window.addEventListener("keydown", (event) => {
        if (timingMode && event.code === "Space") {
          event.preventDefault();
          if (!hasStarted) {
            startCard();
            return;
          }

          recordTimingTap();
          return;
        }

        if (timingMode && event.key === "Backspace") {
          event.preventDefault();
          undoTimingTap();
          return;
        }

        startCard();
      });
      updateTimingHelper();
    </script>
  </body>
</html>
